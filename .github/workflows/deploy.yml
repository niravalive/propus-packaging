name: Debug Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install client dependencies
        run: cd client && npm install

      - name: Build client with debug
        run: |
          cd client
          npm run build
          echo "==== FILES ===="
          ls -la
          echo "==== DIST ===="
          ls -la dist || echo "NO DIST FOUND"
