name: Deploy Frontend to Ecotellus

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install client dependencies
        run: cd client && npm install

      - name: Build client
        run: cd client && npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 119.18.58.248
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp          # 👈 changed (more stable than ftps on your server)
          local-dir: client/dist/
          server-dir: /public_html/
          state-name: none
          dangerous-clean-slate: true
          timeout: 600000        # 👈 THIS fixes your timeout error
          log-level: verbose
